{% from "partials/card-link.html" import cardLink %}
{%- set related = page.url | relatedPosts(tags, collections.posts) -%}
{%- if related.length -%}
<div class="related-posts">
  <h2 class="section-label">Related posts</h2>
  <div class="projects-grid">
    {%- for post in related -%}
    {{ cardLink(post.url, post.data.title, post.data.summary, "Read post") }}
    {%- endfor -%}
  </div>
</div>
{%- endif -%}
