<header>
  <nav aria-label="Main navigation">
    <a class="nav-name" href="/">{{ site.title }}</a>
    <ul class="nav-links">
      {% for link in nav %}
        {% if link.url != "/" %}
        <li><a href="{{ link.url }}" {% if page.url == link.url %}aria-current="page"{% endif %}>{{ link.text }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
</header>
