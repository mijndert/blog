<section class="posts short">
  <h2>Latest posts</h2>
  <ul>
    {%- for post in collections.posts | reverse -%}
      {%- if loop.index0 < 8 -%}
      <li>
        <time class="muted" datetime="{{ post.date | postDate }}">
          {{ post.date | postDate }}
        </time>
        <a href="{{ post.url }}">{{ post.data.title }}</a>
        {%- if post.data.tags %}
        <a href="/topics/{{ post.data.tags }}/" class="tag">{{ post.data.tags }}</a>
        {%- endif %}
      </li>
      {%- endif -%}
    {%- endfor -%}
  </ul>
</section>
